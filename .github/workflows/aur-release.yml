name: AUR Release

on:
    push:
        tags:
            - 'v*'

jobs:
    aur-publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup SSH for AUR
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

            - name: Clone AUR repository
              run: |
                  git clone ssh://aur@aur.archlinux.org/attack-shark-x11-electron.git /tmp/aur-repo

            - name: Update AUR package
              run: |
                  cd /tmp/aur-repo
                  # Copy updated PKGBUILD and .SRCINFO from main repo
                  cp ${{ github.workspace }}/PKGBUILD .
                  cp ${{ github.workspace }}/.SRCINFO .
                  # Update pkgver in PKGBUILD if not already updated
                  sed -i "s/pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" PKGBUILD
                  # Update .SRCINFO
                  makepkg --printsrcinfo > .SRCINFO
                  git add PKGBUILD .SRCINFO
                  git commit -m "release: ${GITHUB_REF_NAME}"
                  git push origin master
