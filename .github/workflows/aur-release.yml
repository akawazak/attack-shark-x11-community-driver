name: AUR Release

on:
    push:
        tags:
            - 'v*'

jobs:
    aur-publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup SSH for AUR
              uses: webfactory/ssh-agent@v0.9.0
              with:
                  ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

            - name: Add AUR host key
              run: |
                  mkdir -p ~/.ssh
                  ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

            - name: Clone AUR repository
              run: |
                  git clone ssh://aur@aur.archlinux.org/attack-shark-x11-electron.git /tmp/aur-repo

            - name: Update AUR package
              run: |
                  cd /tmp/aur-repo
                  # Download source to compute sha256sum dynamically
                  wget -q "https://github.com/dressedinblack5/attack-shark-x11-electron/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz" -O /tmp/source.tar.gz
                  SHA256=$(sha256sum /tmp/source.tar.gz | cut -d' ' -f1)
                  # Copy PKGBUILD and .SRCINFO from main repo, then override values
                  cp ${{ github.workspace }}/PKGBUILD .
                  cp ${{ github.workspace }}/.SRCINFO .
                  sed -i "s/pkgver=.*/pkgver=${GITHUB_REF_NAME#v}/" PKGBUILD
                  sed -i "s|sha256sums=.*|sha256sums=('${SHA256}')|" PKGBUILD
                  sed -i "s/pkgver = .*/pkgver = ${GITHUB_REF_NAME#v}/" .SRCINFO
                  sed -i "s|source = .*|source = https://github.com/dressedinblack5/attack-shark-x11-electron/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz|" .SRCINFO
                  sed -i "s|sha256sums = .*|sha256sums = ${SHA256}|" .SRCINFO
                  git add PKGBUILD .SRCINFO
                  git -c user.name="GitHub Actions" -c user.email="actions@github.com" commit -m "release: ${GITHUB_REF_NAME}"
                  git push origin master
